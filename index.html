<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; }
        #map { width: 100vw; height: 100vh; }

        /* Темный фон за пределами карты */
        .leaflet-container {
            background-color: #1a1a1a !important; 
        }

        /* Плавное сжатие иконок при отдалении */
        .leaflet-marker-icon {
            transform-origin: bottom center !important; 
            transition: transform 0.2s ease-in-out; 
        }

        /* ==========================================
           СТИЛИ БОЛЬШОГО ВСПЛЫВАЮЩЕГО ОКНА (Popup)
           ========================================== */
        .leaflet-popup.fantasy-plaque .leaflet-popup-content-wrapper {
            background: linear-gradient(135deg, #e8d5a6 0%, #d4b881 100%);
            border: 4px solid #4a2e15;
            border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 20px rgba(100,60,20,0.3);
            padding: 0;
        }

        .leaflet-popup.fantasy-plaque .leaflet-popup-tip-container {
            display: none; /* Убираем нижний треугольник */
        }

        .plaque-content {
            padding: 20px;
            font-family: 'Georgia', serif; 
            color: #311c09; 
            max-height: 280px; 
            overflow-y: auto; /* Включаем прокрутку для длинного текста */
        }

        .plaque-content h3 {
            margin: 0 0 12px 0;
            font-size: 19px;
            text-align: center;
            border-bottom: 2px solid #8b5a2b;
            padding-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .plaque-content p {
            margin: 0 0 10px 0;
            font-size: 14px;
            line-height: 1.5;
            text-align: justify;
        }

        /* Кастомный скроллбар для текста */
        .plaque-content::-webkit-scrollbar { width: 6px; }
        .plaque-content::-webkit-scrollbar-track { background: transparent; }
        .plaque-content::-webkit-scrollbar-thumb { background-color: #4a2e15; border-radius: 4px; }

        /* ==========================================
           СТИЛИ НАДПИСЕЙ НАД ИКОНКАМИ (Tooltip)
           ========================================== */
        .leaflet-tooltip.fantasy-label {
            background: transparent !important; 
            border: none !important;            
            box-shadow: none !important;        
            font-family: 'Georgia', serif;
            font-size: 16px;
            font-weight: bold;
            color: #ebdca7; 
            letter-spacing: 1px;
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0px  4px 8px rgba(0,0,0,0.8);
        }

        .leaflet-tooltip.fantasy-label::before {
            display: none !important; /* Убираем треугольник у надписи */
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ==========================================
        // 1. ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ FIREBASE
        // ==========================================
        // ВНИМАНИЕ: ЗАМЕНИ ЭТОТ БЛОК НА СВОИ ДАННЫЕ ИЗ GOOGLE CONSOLE!
        const firebaseConfig = {
              apiKey: "AIzaSyBea7xAB3r_lZf2BhK74CEGgBEylodbO14",
              authDomain: "blood-on-the-fur.firebaseapp.com",
              databaseURL: "https://blood-on-the-fur-default-rtdb.europe-west1.firebasedatabase.app",
              projectId: "blood-on-the-fur",
              storageBucket: "blood-on-the-fur.firebasestorage.app",
              messagingSenderId: "1055039376241",
              appId: "1:1055039376241:web:d62c0fc681d86d7b2304d0",
              measurementId: "G-46SNC9CKGK"
            };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const markersRef = database.ref('eldria_custom_markers'); 

        // ==========================================
        // 2. БАЗОВАЯ НАСТРОЙКА КАРТЫ
        // ==========================================
        var mapUrl = 'images/Вулфкрест.png';
        var bounds = [[0, 0], [638, 1000]];

        var map = L.map('map', {
            crs: L.CRS.Simple,
            maxBounds: bounds,
            maxBoundsViscosity: 1.0,
            minZoom: 0,
            maxZoom: 2,
            attributionControl: false,
            scrollWheelZoom: false // Отключаем зум колесиком
        });

        L.imageOverlay(mapUrl, bounds).addTo(map);
        map.setView([438, 368], 1); // Стартовая позиция

        // ==========================================
        // 2.5 БИБЛИОТЕКА ИКОНОК
        // ==========================================
        // Создаем словарь всех доступных иконок
        var mapIcons = {
            'tower': L.icon({ iconUrl: 'images/tower.png', iconSize: [50, 50], iconAnchor: [25, 50] }),
            'tavern': L.icon({ iconUrl: 'images/таверна.png', iconSize: [60, 60], iconAnchor: [30, 60] }),
            'shop': L.icon({ iconUrl: 'images/shop.png', iconSize: [50, 50], iconAnchor: [25, 50] }),
            'battle': L.icon({ iconUrl: 'images/Битва.png', iconSize: [60, 60], iconAnchor: [30, 60] }),
            'Вопрос': L.icon({ iconUrl: 'images/Вопрос.png', iconSize: [50, 50], iconAnchor: [25, 50] }),
            'Локация': L.icon({ iconUrl: 'images/Локация.png', iconSize: [60, 60], iconAnchor: [30, 60] }),
            'Эвент': L.icon({ iconUrl: 'images/Эвент.png', iconSize: [50, 50], iconAnchor: [25, 50] }),
            // Сюда ты сможешь легко добавлять новые! Например:
            // 'ruins': L.icon({ iconUrl: 'images/ruins.png', iconSize: [45, 45], iconAnchor: [22, 45] }),
            // 'cave': L.icon({ iconUrl: 'images/cave.png', iconSize: [40, 40], iconAnchor: [20, 40] })
        };

        var activeMarkers = {};
        // ==========================================
        // 3. ФУНКЦИЯ ОТРИСОВКИ МЕТКИ НА КАРТЕ
        // ==========================================
        // ==========================================
        // 3. ФУНКЦИЯ ОТРИСОВКИ МЕТКИ НА КАРТЕ
        // ==========================================
        // НОВОЕ: Добавили параметр `key` первым аргументом
        function createMarkerOnMap(key, y, x, title, desc, iconType) {
            var selectedIcon = mapIcons[iconType] || mapIcons['tower'];
            var newMarker = L.marker([y, x], {icon: selectedIcon}).addTo(map);

            // НОВОЕ: Добавили красную кнопку "Разрушить метку", которая передает `key`
            var popupContent = `
                <div class="plaque-content">
                    <h3>${title}</h3>
                    <p>${desc}</p>
                    <button onclick="deleteMarker('${key}')" 
                            style="margin-top: 15px; width: 100%; padding: 6px; background: #6b2424; color: #ebdca7; border: 1px solid #4a2e15; cursor: pointer; font-family: 'Georgia', serif; font-size: 12px; font-weight: bold;">
                        Разрушить метку
                    </button>
                </div>
            `;

            newMarker.bindTooltip(title, {
                permanent: true, direction: 'top', offset: [0, -40], className: 'fantasy-label'
            });

            // Защита прокрутки текста (чтобы не скроллилась сама страница)
            newMarker.on('popupopen', function(e) {
                var container = e.popup._container.querySelector('.plaque-content');
                if (container) { L.DomEvent.on(container, 'wheel', L.DomEvent.stopPropagation); }
            });

            // Запоминаем этот маркер в словаре под его уникальным ключом
            activeMarkers[key] = newMarker;
        }

        // ==========================================
        // 4. ЗАГРУЗКА МЕТОК ИЗ БАЗЫ
        // ==========================================
        markersRef.on('child_added', function(snapshot) {
            var data = snapshot.val();
            var key = snapshot.key; // Достаем уникальный ID метки
            // Передаем key в функцию
            createMarkerOnMap(key, data.y, data.x, data.title, data.description, data.icon);
        });

        // НОВОЕ: Когда из базы удаляется метка:
        markersRef.on('child_removed', function(snapshot) {
            var key = snapshot.key;
            
            // Если такой маркер есть на карте - стираем его
            if (activeMarkers[key]) {
                map.removeLayer(activeMarkers[key]); // Убирает картинку с карты
                delete activeMarkers[key];           // Стирает из памяти
            }
        });

        // ==========================================
        // 5. ИНТЕРФЕЙС СОЗДАНИЯ НОВОЙ МЕТКИ
        // ==========================================
        // ==========================================
        // 5. ИНТЕРФЕЙС СОЗДАНИЯ НОВОЙ МЕТКИ
        // ==========================================
        var creationPopup = L.popup({ className: 'fantasy-plaque', minWidth: 300 });

        map.on('click', function(e) {
            var y = Math.round(e.latlng.lat);
            var x = Math.round(e.latlng.lng);

            var formHtml = `
                <div class="plaque-content" style="padding: 15px;">
                    <h3>Новое место</h3>
                    
                    <input type="text" id="newMarkerTitle" placeholder="Название локации..." 
                           style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; background: #311c09; color: #ebdca7; border: 1px solid #8b5a2b; font-family: 'Georgia', serif;">
                    
                    <select id="newMarkerIcon" style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; background: #311c09; color: #ebdca7; border: 1px solid #8b5a2b; font-family: 'Georgia', serif; outline: none;">
                        <option value="tower">Башня</option>
                        <option value="tavern">Таверна</option>
                        <option value="shop">Магазинчик</option>
                        <option value="Вопрос">Место интереса</option>
                        <option value="Эвент">Событие</option>
                        <option value="Локация">Иконка локации</option>
                        <option value="battle">Иконка Битвы</option>
                    </select>
                    <textarea id="newMarkerDesc" placeholder="История этого места..." rows="4" 
                              style="width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 8px; background: #311c09; color: #ebdca7; border: 1px solid #8b5a2b; font-family: 'Georgia', serif; resize: none;"></textarea>
                    
                    <button onclick="saveMarker(${y}, ${x})" 
                            style="width: 100%; padding: 10px; background: #8b5a2b; color: #ebdca7; border: 1px solid #4a2e15; cursor: pointer; font-family: 'Georgia', serif; font-weight: bold; text-transform: uppercase;">
                        Воздвигнуть метку
                    </button>
                </div>
            `;
            creationPopup.setLatLng([y, x]).setContent(formHtml).openOn(map);
        });

// Отправка данных в Firebase
        window.saveMarker = function(y, x) {
            var title = document.getElementById('newMarkerTitle').value;
            var desc = document.getElementById('newMarkerDesc').value;
            // Читаем выбранное значение из нашего списка
            var iconType = document.getElementById('newMarkerIcon').value; 

            if (title.trim() === "") {
                alert("Назови это место, путник!");
                return;
            }

            // Отправляем в базу, добавив параметр icon
            markersRef.push({
                y: y,
                x: x,
                title: title,
                description: desc,
                icon: iconType // <--- СОХРАНЯЕМ ВЫБОР СЮДА
            });

            map.closePopup(creationPopup);
        };

        // ==========================================
        // 6. МАСШТАБИРОВАНИЕ ИКОНОК
        // ==========================================
        map.on('zoomend', function() {
            var currentZoom = map.getZoom();
            var scale = 1;
            if (currentZoom === 0) scale = 0.5;
            else if (currentZoom === 1) scale = 0.8;
            
            document.querySelectorAll('.leaflet-marker-icon').forEach(function(marker) {
                var currentTransform = marker.style.transform;
                if (currentTransform) {
                    var cleanTransform = currentTransform.replace(/ scale\([0-9.]+\)/, '');
                    marker.style.transform = cleanTransform + ' scale(' + scale + ')';
                }
            });
        });
        // ==========================================
        // ФУНКЦИЯ УДАЛЕНИЯ ДАННЫХ ИЗ FIREBASE
        // ==========================================
        window.deleteMarker = function(key) {
            // Спрашиваем подтверждение, чтобы не удалить случайно
            var confirmDelete = confirm("Ты уверен, что хочешь стереть это место с лица Элдрии?");
            
            if (confirmDelete) {
                // Обращаемся к конкретной метке по её ID и говорим "Удали себя"
                markersRef.child(key).remove();
            }
        };
        
        map.fire('zoomend');
    </script>
</body>
</html>
