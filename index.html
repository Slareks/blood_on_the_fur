<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; }
        #map { width: 100vw; height: 100vh; }
        .leaflet-container { background-color: #1a1a1a !important; }
        .leaflet-marker-icon { transform-origin: bottom center !important; transition: transform 0.2s ease-in-out; }
        
        .leaflet-popup.fantasy-plaque .leaflet-popup-content-wrapper {
            background: linear-gradient(135deg, #e8d5a6 0%, #d4b881 100%);
            border: 4px solid #4a2e15; border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 20px rgba(100,60,20,0.3); padding: 0;
        }
        .leaflet-popup.fantasy-plaque .leaflet-popup-tip-container { display: none; }
        
        .plaque-content { padding: 20px; font-family: 'Georgia', serif; color: #311c09; max-height: 280px; overflow-y: auto; }
        .plaque-content h3 { margin: 0 0 12px 0; font-size: 19px; text-align: center; border-bottom: 2px solid #8b5a2b; padding-bottom: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .plaque-content p { margin: 0 0 10px 0; font-size: 14px; line-height: 1.5; text-align: justify; }
        .plaque-content::-webkit-scrollbar { width: 6px; }
        .plaque-content::-webkit-scrollbar-track { background: transparent; }
        .plaque-content::-webkit-scrollbar-thumb { background-color: #4a2e15; border-radius: 4px; }
        
        .leaflet-tooltip.fantasy-label {
            background: transparent !important; border: none !important; box-shadow: none !important; font-family: 'Georgia', serif; font-size: 16px; font-weight: bold; color: #ebdca7; letter-spacing: 1px;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0px 4px 8px rgba(0,0,0,0.8);
        }
        .leaflet-tooltip.fantasy-label::before { display: none !important; }
    </style>
</head>
<body>
    
    <div id="mapSelector" style="position: absolute; top: 10px; left: 50px; z-index: 1000; display: none; gap: 10px;">
        <button onclick="masterSwitchMap('city')" style="padding: 10px 15px; background: #311c09; color: #ebdca7; border: 2px solid #8b5a2b; border-radius: 5px; cursor: pointer; font-family: 'Georgia', serif; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
            🏙️ Город Вулфкрест
        </button>
        <button onclick="masterSwitchMap('world')" style="padding: 10px 15px; background: #311c09; color: #ebdca7; border: 2px solid #8b5a2b; border-radius: 5px; cursor: pointer; font-family: 'Georgia', serif; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
            🌍 Карта Мира
        </button>
    </div>
    
    <div id="authContainer" style="position: absolute; top: 10px; right: 10px; z-index: 1000; text-align: right;">
        <button onclick="toggleAuthPanel()" style="background: rgba(49, 28, 9, 0.8); color: #ebdca7; border: 2px solid #8b5a2b; border-radius: 5px; padding: 8px 12px; cursor: pointer; margin-bottom: 5px; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
            🗝️
        </button>

        <div id="authPanel" style="display: none; background: rgba(26, 26, 26, 0.9); padding: 15px; border: 2px solid #8b5a2b; border-radius: 5px; font-family: 'Georgia', serif; color: #ebdca7;">
            <div id="loginForm">
                <input type="text" id="emailInput" placeholder="Почта мастера" style="margin-bottom: 8px; width: 160px; padding: 5px; background: #311c09; color: #ebdca7; border: 1px solid #8b5a2b;"><br>
                <input type="password" id="passwordInput" placeholder="Пароль" style="margin-bottom: 8px; width: 160px; padding: 5px; background: #311c09; color: #ebdca7; border: 1px solid #8b5a2b;"><br>
                <button onclick="loginMaster()" style="width: 100%; padding: 6px; background: #8b5a2b; color: #ebdca7; border: 1px solid #4a2e15; cursor: pointer; font-weight: bold;">Войти</button>
            </div>
            <div id="masterPanel" style="display: none; text-align: center;">
                <p style="margin: 0 0 10px 0; font-size: 14px; color: #a4d3a2;">Режим Мастера активен</p>
                <button onclick="logoutMaster()" style="width: 100%; padding: 6px; background: #6b2424; color: #ebdca7; border: 1px solid #4a2e15; cursor: pointer; font-weight: bold;">Покинуть пост</button>
            </div>
        </div>
    </div>
    
    <div id="map"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ==========================================
        // 1. FIREBASE
        // ==========================================
        const firebaseConfig = {
              apiKey: "AIzaSyBea7xAB3r_lZf2BhK74CEGgBEylodbO14",
              authDomain: "blood-on-the-fur.firebaseapp.com",
              databaseURL: "https://blood-on-the-fur-default-rtdb.europe-west1.firebasedatabase.app",
              projectId: "blood-on-the-fur",
              storageBucket: "blood-on-the-fur.firebasestorage.app",
              messagingSenderId: "1055039376241",
              appId: "1:1055039376241:web:d62c0fc681d86d7b2304d0",
              measurementId: "G-46SNC9CKGK"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const markersRef = database.ref('eldria_custom_markers'); 
        const stateRef = database.ref('eldria_global_state/active_map'); // НОВОЕ: Ссылка на текущую активную карту для всех

        // ==========================================
        // 2. АВТОРИЗАЦИЯ И ИНТЕРФЕЙС
        // ==========================================
        const auth = firebase.auth();
        let isMaster = false; 

        window.toggleAuthPanel = function() {
            var panel = document.getElementById('authPanel');
            panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
        };

        auth.onAuthStateChanged(function(user) {
            if (user) {
                isMaster = true;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('masterPanel').style.display = 'block';
                document.getElementById('mapSelector').style.display = 'flex'; // Мастер видит переключатель
            } else {
                isMaster = false;
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('masterPanel').style.display = 'none';
                document.getElementById('mapSelector').style.display = 'none'; // Игроки не видят переключатель
            }
        });

        window.loginMaster = function() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Ошибка: " + e.message));
        };

        window.logoutMaster = function() {
            auth.signOut();
            document.getElementById('authPanel').style.display = 'none';
        };

        // ==========================================
        // 3. СИНХРОНИЗАЦИЯ СЦЕН (ЛОКАЦИЙ)
        // ==========================================
        var mapsConfig = {
            'city': { url: 'images/Вулфкрест.png', width: 1000, height: 638, center: [438, 368], zoom: 1 },
            'world': { url: 'images/map.jpg', width: 2000, height: 1500, center: [750, 1000], zoom: 0 }
        };

        var currentMapId = null; // Изначально не знаем, какая карта
        var currentOverlay = null; 
        var allMarkersData = {};   

        var map = L.map('map', {
            crs: L.CRS.Simple, minZoom: 0, maxZoom: 2, attributionControl: false, scrollWheelZoom: false
        });

        // Внутренняя функция перерисовки
        function renderMap(newMapId) {
            if (currentMapId === newMapId) return; // Если мы уже тут, ничего не делаем
            currentMapId = newMapId;
            var config = mapsConfig[newMapId];
            var bounds = [[0, 0], [config.height, config.width]];

            if (currentOverlay) map.removeLayer(currentOverlay);
            
            currentOverlay = L.imageOverlay(config.url, bounds).addTo(map);
            map.setMaxBounds(bounds);
            map.setView(config.center, config.zoom);

            for (var key in activeMarkers) {
                map.removeLayer(activeMarkers[key]);
                delete activeMarkers[key];
            }

            for (var key in allMarkersData) {
                var data = allMarkersData[key];
                if (data.mapId === currentMapId) {
                    createMarkerOnMap(key, data.y, data.x, data.title, data.description, data.icon);
                }
            }
        }

        // НОВОЕ: Функция для мастера (переключает карту и записывает выбор в базу для всех)
        window.masterSwitchMap = function(newMapId) {
            if (!isMaster) return;
            stateRef.set(newMapId); // Записываем в базу: "Теперь все смотрят сюда"
        };

        // НОВОЕ: Слушаем базу. Если мастер переключил карту - она переключится У ВСЕХ
        stateRef.on('value', function(snapshot) {
            var activeMapInBase = snapshot.val() || 'city'; // Если база пустая, грузим город
            renderMap(activeMapInBase);
        });

        // ==========================================
        // 4. МАРКЕРЫ (ИКОНКИ, ОТРИСОВКА)
        // ==========================================
        var mapIcons = {
            'tower': L.icon({ iconUrl: 'images/tower.png', iconSize: [50, 50], iconAnchor: [25, 50] }),
            'tavern': L.icon({ iconUrl: 'images/таверна.png', iconSize: [60, 60], iconAnchor: [30, 60] }),
            'shop': L.icon({ iconUrl: 'images/shop.png', iconSize: [50, 50], iconAnchor: [25, 50] }),
            'battle': L.icon({ iconUrl: 'images/Битва.png', iconSize: [60, 60], iconAnchor: [30, 60] }),
            'Вопрос': L.icon({ iconUrl: 'images/Вопрос.png', iconSize: [50, 50], iconAnchor: [25, 50] }),
            'Локация': L.icon({ iconUrl: 'images/Локация.png', iconSize: [60, 60], iconAnchor: [30, 60] }),
            'Эвент': L.icon({ iconUrl: 'images/Эвент.png', iconSize: [50, 50], iconAnchor: [25, 50] })
        };
        var activeMarkers = {};

        function getPopupHtml(key, title, desc) {
            const user = firebase.auth().currentUser;
            const deleteBtn = user 
                ? `<button onclick="deleteMarker('${key}')" style="margin-top: 15px; width: 100%; padding: 6px; background: #6b2424; color: #ebdca7; border: 1px solid #4a2e15; cursor: pointer; font-family: 'Georgia', serif; font-size: 12px; font-weight: bold;">Разрушить метку</button>` 
                : '';
            return `<div class="plaque-content"><h3>${title}</h3><p>${desc}</p>${deleteBtn}</div>`;
        }

        function createMarkerOnMap(key, y, x, title, desc, iconType) {
            var selectedIcon = mapIcons[iconType] || mapIcons['tower'];
            var newMarker = L.marker([y, x], {icon: selectedIcon}).addTo(map);

            newMarker.on('click', function(e) { L.DomEvent.stopPropagation(e); });
            newMarker.bindPopup("", { className: 'fantasy-plaque', offset: [0, -35], maxWidth: 400, minWidth: 350 });
            
            newMarker.on('popupopen', function(e) {
                newMarker.setPopupContent(getPopupHtml(key, title, desc));
                var container = e.popup._container.querySelector('.plaque-content');
                if (container) { L.DomEvent.on(container, 'wheel', L.DomEvent.stopPropagation); }
            });

            newMarker.bindTooltip(title, { permanent: true, direction: 'top', offset: [0, -40], className: 'fantasy-label' });
            activeMarkers[key] = newMarker;
        }

        // ==========================================
        // 5. ЗАГРУЗКА И СОХРАНЕНИЕ
        // ==========================================
        markersRef.on('child_added', function(snapshot) {
            var data = snapshot.val();
            var key = snapshot.key;
            data.mapId = data.mapId || 'city'; 
            allMarkersData[key] = data;

            if (data.mapId === currentMapId) {
                createMarkerOnMap(key, data.y, data.x, data.title, data.description, data.icon);
            }
        });

        markersRef.on('child_removed', function(snapshot) {
            var key = snapshot.key;
            if (activeMarkers[key]) {
                map.removeLayer(activeMarkers[key]);
                delete activeMarkers[key];
            }
            delete allMarkersData[key]; 
        });

        // Создание
        map.on('click', function(e) {
            if (!isMaster) return;
            var y = Math.round(e.latlng.lat);
            var x = Math.round(e.latlng.lng);
            var screenY = e.containerPoint.y;
            var yOffset = screenY < 350 ? 320 : 0; 

            var creationPopup = L.popup({ className: 'fantasy-plaque', minWidth: 300, offset: [0, yOffset] });

            var formHtml = `
                <div class="plaque-content" style="padding: 15px;">
                    <h3>Новое место</h3>
                    <input type="text" id="newMarkerTitle" placeholder="Название локации..." style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; background: #311c09; color: #ebdca7; border: 1px solid #8b5a2b; font-family: 'Georgia', serif;">
                    
                    <select id="newMarkerIcon" style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; background: #311c09; color: #ebdca7; border: 1px solid #8b5a2b; font-family: 'Georgia', serif; outline: none;">
                        <option value="tower">Иконка башни</option>
                        <option value="tavern">Иконка таверны</option>
                        <option value="shop">Иконка магазина</option>
                        <option value="battle">Иконка битвы</option>
                        <option value="Вопрос">Иконка интересного места</option>
                        <option value="Эвент">Иконка события</option>
                        <option value="Локация">Иконка локации</option>
                    </select>

                    <textarea id="newMarkerDesc" placeholder="История этого места..." rows="4" style="width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 8px; background: #311c09; color: #ebdca7; border: 1px solid #8b5a2b; font-family: 'Georgia', serif; resize: none;"></textarea>
                    
                    <button onclick="saveMarker(${y}, ${x})" style="width: 100%; padding: 10px; background: #8b5a2b; color: #ebdca7; border: 1px solid #4a2e15; cursor: pointer; font-family: 'Georgia', serif; font-weight: bold; text-transform: uppercase;">
                        Воздвигнуть метку
                    </button>
                </div>
            `;
            creationPopup.setLatLng([y, x]).setContent(formHtml).openOn(map);
        });

        window.saveMarker = function(y, x) {
            var title = document.getElementById('newMarkerTitle').value;
            var desc = document.getElementById('newMarkerDesc').value;
            var iconType = document.getElementById('newMarkerIcon').value; 

            if (title.trim() === "") { alert("Назови это место, путник!"); return; }

            markersRef.push({ y: y, x: x, title: title, description: desc, icon: iconType, mapId: currentMapId });
            map.closePopup();
        };

        window.deleteMarker = function(key) {
            if (!firebase.auth().currentUser) { alert("У вас нет власти в этих землях!"); return; }
            if (confirm("Стереть это место с лица Элдрии?")) markersRef.child(key).remove();
        };

        map.on('zoomend', function() {
            var scale = map.getZoom() === 0 ? 0.5 : (map.getZoom() === 1 ? 0.8 : 1);
            document.querySelectorAll('.leaflet-marker-icon').forEach(m => {
                m.style.transform = (m.style.transform || '').replace(/ scale\([0-9.]+\)/, '') + ' scale(' + scale + ')';
            });
        });
        map.fire('zoomend');
    </script>
</body>
</html>
